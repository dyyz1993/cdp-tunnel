      - name: Run Playwright close hang test
        run: xvfb-run node tests/e2e/test-playwright-close.js
        env:
          CHROME_PATH: ${{ steps.chromium.outputs.path }}
          LOG_LEVEL: warn
          CI: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-close-logs
          path: logs/
          retention-days: 7

