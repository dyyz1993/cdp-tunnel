name: E2E Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install and locate Chromium
        id: chromium
        run: |
          npx playwright install chromium
          CHROME_PATH=$(find /home/runner/.cache/ms-playwright -type f -name "chrome" -o -name "chromium" | head -1)
          echo "path=$CHROME_PATH" >> "$GITHUB_OUTPUT"
          echo "Chromium found at: $CHROME_PATH"

      - name: Run E2E Tests
        run: node tests/e2e/run-all.js
        env:
          CHROME_PATH: ${{ steps.chromium.outputs.path }}
          LOG_LEVEL: warn
          CI: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: logs/
          retention-days: 7
